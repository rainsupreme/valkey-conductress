name: Tests

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements/pip-requirements.txt -r requirements/pip-requirements-dev.txt
      - name: Run unit tests
        run: pytest tests/unit
        env:
          PYTHONPATH: ${{ github.workspace }}
      - name: Run integration tests
        run: pytest tests/integration -m "not requires_server"
        env:
          PYTHONPATH: ${{ github.workspace }}
      - name: Type checking
        run: mypy src/ --ignore-missing-imports

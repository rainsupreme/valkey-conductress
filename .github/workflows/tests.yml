name: Tests

on: [push, pull_request]

jobs:
  dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Check DCO signoff
        run: |
          base=${{ github.event.pull_request.base.sha }}
          for sha in $(git rev-list $base..HEAD); do
            if ! git log -1 --format='%B' "$sha" | grep -qE '^Signed-off-by: .+ <.+>'; then
              echo "::error::Commit $sha missing Signed-off-by. Use 'git commit -s'."
              exit 1
            fi
          done
          echo "All commits have DCO signoff ✓"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install -e . 'black==25.11.0' 'isort==5.13.2' 'pylint>=3.0,<4.0'
      - run: black --check --line-length 120 src/ tests/
      - run: isort --check-only --profile black --line-length 120 src/ tests/
      - run: pylint --errors-only --disable=import-error src/

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package and dependencies
        run: pip install -e '.[dev]'
      - name: Run unit tests
        run: pytest tests/unit --cov=conductress --cov-report=term-missing --cov-report=xml --cov-fail-under=58
      - name: Run integration tests
        run: pytest tests/integration -m "not requires_server"
      - name: Type checking
        run: mypy src/ --ignore-missing-imports
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
